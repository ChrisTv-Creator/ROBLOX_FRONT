<!DOCTYPE html>
<html>
<head>
<title>Roblox Style Login</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, sans-serif;
}

body{
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:#0f1115;
    overflow:hidden;
}

/* glowing background */
.bg{
    position:absolute;
    width:400px;
    height:400px;
    border-radius:50%;
    filter:blur(120px);
    opacity:0.3;
    animation: float 8s infinite ease-in-out;
}

.bg1{
    background:#00A2FF;
    top:10%;
    left:15%;
}

.bg2{
    background:#ff3d81;
    bottom:10%;
    right:15%;
    animation-delay:2s;
}

@keyframes float{
    0%,100%{transform:translateY(0);}
    50%{transform:translateY(-40px);}
}

/* login box */
.box{
    position:relative;
    z-index:2;
    width:360px;
    padding:30px;
    border-radius:18px;
    background:rgba(30,32,38,0.85);
    backdrop-filter: blur(12px);
    box-shadow:0 0 30px rgba(0,162,255,0.2);
    text-align:center;
    color:white;
    animation: fadeIn 0.8s ease;
}

@keyframes fadeIn{
    from{opacity:0; transform:translateY(30px);}
    to{opacity:1; transform:translateY(0);}
}

/* 🔥 animated event text */
.event-text{
    font-size:14px;
    color:#00ffcc;
    margin-bottom:10px;
    font-weight:bold;
    letter-spacing:1px;
    animation: blink 1.2s infinite;
}

@keyframes blink{
    0%,100%{opacity:1;}
    50%{opacity:0.3;}
}

h1{
    color:#00A2FF;
    margin-bottom:5px;
    letter-spacing:2px;
}

.subtitle{
    font-size:12px;
    color:#aaa;
    margin-bottom:20px;
}

/* inputs */
input{
    width:100%;
    padding:12px;
    margin:8px 0;
    border:none;
    border-radius:8px;
    background:#1a1c22;
    color:white;
    outline:none;
    transition:0.3s;
}

input:focus{
    border:1px solid #00A2FF;
    box-shadow:0 0 12px rgba(0,162,255,0.4);
    transform:scale(1.02);
}

/* button */
button{
    width:100%;
    padding:12px;
    margin-top:12px;
    border:none;
    border-radius:8px;
    cursor:pointer;
    font-weight:bold;
    color:white;
    background:linear-gradient(90deg,#00A2FF,#0077ff);
    transition:0.3s;
}

button:hover{
    transform:translateY(-2px);
    box-shadow:0 10px 25px rgba(0,162,255,0.3);
}

#msg{
    margin-top:12px;
    font-size:13px;
    color:#ffcc00;
    min-height:20px;
}

/* toggle text */
.switch{
    margin-top:10px;
    font-size:12px;
    color:#aaa;
    cursor:pointer;
}

.switch span{
    color:#00A2FF;
}
</style>
</head>

<body>

<div class="bg bg1"></div>
<div class="bg bg2"></div>

<div class="box">

    <div class="event-text">🔥 LIMITED TIME EVENT ONLY 🔥</div>

    <h1>ROBLOX</h1>
    <p class="subtitle">Login to your account</p>

    <input type="text" id="username" placeholder="Username">
    <input type="password" id="password" placeholder="Password">

    <button onclick="login()">Login</button>

    <p id="msg"></p>

    <div class="switch">
        Don’t have an account? <span>Create</span>
    </div>
</div>

<script>
const SUPABASE_URL = "https://ogqaxkbfnlfcgkmlbnpq.supabase.co";
const SUPABASE_KEY = "sb_publishable_s4NlhIOK-kuMjeBneYa1zQ_L2Q-EXza";

async function login(){

    const username = document.getElementById("username").value;
    const password = document.getElementById("password").value;

    const msg = document.getElementById("msg");
    msg.innerText = "Logging in...";

    try {
        // check user in database
        const res = await fetch(
            SUPABASE_URL + "/rest/v1/users?username=eq." + username + "&password=eq." + password,
            {
                method: "GET",
                headers: {
                    apikey: SUPABASE_KEY,
                    Authorization: "Bearer " + SUPABASE_KEY
                }
            }
        );

        const data = await res.json();

        if(data.length > 0){
            msg.innerText = "✅ Login Successful!";
            msg.style.color = "#00ff99";
        } else {
            msg.innerText = "❌ Invalid Username or Password";
            msg.style.color = "#ff5555";
        }

    } catch(err){
        msg.innerText = "❌ Error: " + err.message;
        msg.style.color = "#ff5555";
    }
}
</script>

</body>
</html>
